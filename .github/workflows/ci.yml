# ─────────────────────────────────────────────────────────────────────────────
# JobHunt — CI Pipeline
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs on every push and pull request to ensure code quality before merging.
#
# Jobs run in parallel where possible:
#
#   ┌─────────────┐   ┌─────────────────┐
#   │  lint-fe    │   │   lint-be       │
#   └──────┬──────┘   └────────┬────────┘
#          │                   │
#   ┌──────▼──────┐   ┌────────▼────────┐
#   │  build-fe   │   │   test-be       │
#   └─────────────┘   └────────┬────────┘
#                              │
#                     ┌────────▼────────┐
#                     │   build-be      │
#                     └─────────────────┘
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Cancel any in-progress CI run for the same branch when a new push arrives.
# Prevents wasting minutes on outdated runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: Lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint (Frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache node_modules based on package-lock.json
          # Skips npm install if nothing changed → much faster CI
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Frontend: Build ────────────────────────────────────────────────────────
  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    needs: lint-frontend  # only build if lint passed

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Pass dummy env vars so the build doesn't fail on missing NEXT_PUBLIC_* vars
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

  # ─── Backend: Lint ──────────────────────────────────────────────────────────
  lint-backend:
    name: Lint (Backend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Backend: Test ──────────────────────────────────────────────────────────
  test-backend:
    name: Test (Backend)
    runs-on: ubuntu-latest
    needs: lint-backend

    # Spin up a real PostgreSQL database for integration tests
    # This mirrors the Neon setup so tests run against actual Postgres
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: jobhunt_test
          POSTGRES_USER: jobhunt
          POSTGRES_PASSWORD: jobhunt
        ports:
          - 5432:5432
        # Wait for postgres to be healthy before running tests
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://jobhunt:jobhunt@localhost:5432/jobhunt_test

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://jobhunt:jobhunt@localhost:5432/jobhunt_test
          JWT_SECRET: ci-test-secret-not-used-in-production-min-32-chars
          FRONTEND_URL: http://localhost:3000

  # ─── Backend: Build ─────────────────────────────────────────────────────────
  build-backend:
    name: Build (Backend)
    runs-on: ubuntu-latest
    needs: test-backend

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Compile TypeScript
        run: npm run build
