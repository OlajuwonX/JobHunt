# ─────────────────────────────────────────────────────────────────────────────
# JobHunt — Deploy Pipeline
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs ONLY when CI passes on the main branch.
# Deploys:
#   - Frontend → Vercel (automatic via Vercel GitHub integration)
#   - Backend  → Render (via deploy hook URL)
#
# SETUP REQUIRED:
#   Add these secrets in GitHub → Settings → Secrets → Actions:
#
#   RENDER_DEPLOY_HOOK_URL
#     Render dashboard → your backend service → Settings → Deploy Hook
#     Copy the URL and paste it here as a secret.
#
#   Note: Vercel deployment is handled automatically by the Vercel GitHub
#   integration — just connect the repo in vercel.com and it deploys on push.
#   No extra setup needed in this workflow for the frontend.
#
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  # Only deploy when CI workflow completes successfully on main
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest

    # Only run if the CI workflow succeeded — never deploy broken code
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy
        # Render exposes a deploy hook URL — hitting it with a POST triggers a deploy
        # The URL contains your service ID and is stored as a GitHub secret
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"

      - name: Deployment triggered
        run: echo "Backend deploy triggered on Render. Check render.com for progress."
