# ─────────────────────────────────────────────────────────────
# JobHunt — Dev Docker Setup (Hot Reload Enabled)
# ─────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jobhunt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Express + Prisma) ────────────────────────────
  backend:
    build:
      context: ./backend
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (Next.js) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:4000
    depends_on:
      - backend

# ─── Persistent Database Volume ──────────────────────────────
volumes:
  pgdata: