# ─────────────────────────────────────────────────────────────────────────────
# JobHunt — Docker Compose (Local Development)
# ─────────────────────────────────────────────────────────────────────────────
#
# Starts three services:
#   - postgres: local database (optional, for offline use)
#   - backend:  Express API on port 4000
#   - frontend: Next.js on port 3000
#
# USAGE:
#   Start everything:      docker-compose up --build
#   Start in background:   docker-compose up -d
#   Stop everything:       docker-compose down
#   Reset database:        docker-compose down -v
#   View logs:             docker-compose logs -f backend
#
# DEFAULT MODE (recommended):
#   Uses Neon DB via DATABASE_URL
#
# TO SWITCH TO LOCAL POSTGRES:
#   1. Update DATABASE_URL 
#   2. Restart containers
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ─── PostgreSQL (OPTIONAL - for local/offline development) ────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jobhunt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Express API) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev   # make sure your backend uses nodemon or similar

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobhunt_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev   # Next.js dev server

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pgdata: